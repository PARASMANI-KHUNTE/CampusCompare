# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy both server and client in one click

services:
  # ─── Backend API (Web Service) ───────────────────────────
  - type: web
    name: campuscompare-api
    runtime: node
    region: singapore  # closest to India
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # you'll set this manually (Supabase)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a random secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://campuscompare-app.onrender.com
      - key: PORT
        value: 5000

  # ─── Frontend (Static Site) ─────────────────────────────
  - type: web
    name: campuscompare-app
    runtime: static

    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://campuscompare-api.onrender.com/api
